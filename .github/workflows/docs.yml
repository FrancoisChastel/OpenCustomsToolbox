name: Docs

# Build the docs on every push (a green "does it build?" check). The deploy job
# is gated to manual dispatch because GitHub Pages is not enabled for this repo
# yet (private repo / plan). To go live later:
#   1. enable a host — make the repo public (Pages works free), upgrade the plan,
#      or point an external host (Netlify/Cloudflare/Vercel) at the built site/;
#   2. run this workflow from the Actions tab (Run workflow), or restore the
#      push trigger on the deploy job.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - requirements-docs.txt
      - scripts/gen_llms_full.py
      - Sydonia/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Regenerate llms-full.txt
        run: python scripts/gen_llms_full.py

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Manual-only until a host is chosen (see the note at the top of this file).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
